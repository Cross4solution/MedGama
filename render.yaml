services:
  - type: web
    name: medagama-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./
    region: frankfurt
    plan: starter
    healthCheckPath: /api/health

    preDeployCommand: "php artisan migrate --force"

    envVars:
      - key: APP_NAME
        value: MedaGama
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false           # Set in Render dashboard → Environment
      - key: APP_URL
        sync: false           # e.g. https://medagama-backend.onrender.com

      # ── Database (TiDB Cloud / MySQL) ──
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false           # TiDB Cloud gateway host
      - key: DB_PORT
        value: "4000"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/cert.pem   # Alpine system CA; override if needed

      # ── Frontend origin (Vercel) ──
      - key: CORS_ALLOWED_ORIGINS
        sync: false           # e.g. https://medagama.vercel.app,https://medagama.com
      - key: FRONTEND_URL
        sync: false

      # ── Queue / Cache ──
      # Default: database driver (Render starter has no Redis → deploy stays green).
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_DRIVER
        value: database
      - key: SESSION_DRIVER
        value: database

      # ── Redis (OPT-IN — leave unset to keep database cache/queue) ──
      # To enable Redis: provision a Redis service, then set these and switch
      # QUEUE_CONNECTION=redis / CACHE_STORE=redis above. If unset, the app keeps
      # using the database driver — nothing breaks.
      # - key: REDIS_HOST
      #   sync: false          # Redis host
      # - key: REDIS_PORT
      #   value: "6379"
      # - key: REDIS_PASSWORD
      #   sync: false          # Redis password (or leave null)

      # ── Mail ──
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: MedaGama
